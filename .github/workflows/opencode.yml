name: opencode

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  auto-fix:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run opencode for auto-fix
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          model: openrouter/nvidia/nemotron-3-ultra-550b-a55b:free
          prompt: |
            This pull request needs to be fixed. Do the following:

            1. Check if there are merge conflicts. If yes, resolve them by merging the target branch into this branch while keeping the PR's changes.
            2. Check for CI/test failures and fix the failing tests or code.
            3. Check for linting errors and fix them.
            4. Check for type errors and fix them.
            5. If there are review comments requesting changes, address them.
            6. Make sure the code builds successfully.

            After fixing, commit all changes directly to this branch and post a summary comment on the PR with what was fixed.
          use_github_token: true

  opencode:
    if: |
      github.event_name == 'issue_comment' && (
        contains(github.event.comment.body, ' /oc') ||
        startsWith(github.event.comment.body, '/oc') ||
        contains(github.event.comment.body, ' /opencode') ||
        startsWith(github.event.comment.body, '/opencode')
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          model: openrouter/nvidia/nemotron-3-ultra-550b-a55b:free