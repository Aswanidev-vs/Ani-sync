name: Auto PR Fix

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode for PR fixes
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          model: google/gemini-3.5-flash
          prompt: |
            This PR needs fixes. Do the following:
            
            1. Check if there are merge conflicts. If yes, resolve them by updating the branch to match the target branch while keeping the PR's changes.
            2. Check for CI/test failures and fix them.
            3. Check for linting errors and fix them.
            4. Check for type errors and fix them.
            5. If there are review comments requesting changes, address them.
            
            After fixing, commit the changes and post a summary of what you fixed.
          use_github_token: true