name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build
        run: |
          npm install
          npm run build

      - name: Package for distribution
        run: |
          mkdir -p Ani-sync
          cp main.js manifest.json styles.css Ani-sync/
          zip -r Ani-sync.zip Ani-sync/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Ani-sync.zip
            main.js
            manifest.json
            styles.css
          generate_release_notes: true
